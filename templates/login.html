<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — LP List Processor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 10px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; color: #111; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: .4rem; }
    input[type=password] { width: 100%; padding: .6rem .8rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
    input[type=password]:focus { outline: 2px solid #2563eb; border-color: transparent; }
    button { margin-top: 1.2rem; width: 100%; padding: .7rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { margin-top: 1rem; color: #dc2626; font-size: .875rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LP List Processor</h1>
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Sign in</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
  </div>
</body>
</html>
