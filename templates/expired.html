<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 10px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 2px 16px rgba(0,0,0,.08); text-align: center; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: .75rem; }
    p { color: #6b7280; font-size: .9rem; margin-bottom: 1.5rem; }
    a { display: inline-block; padding: .6rem 1.4rem; background: #2563eb; color: #fff; border-radius: 6px; font-size: .9rem; font-weight: 600; text-decoration: none; }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Session Expired</h1>
    <p>This download link has expired (files are kept for 1 hour). Please re-upload and process your files.</p>

</html>
